# builder — dev compose
#
# Single CommunitySolidServer v7 instance on port 3071 hosting the demo
# persona (alice). This stack only matters if you run mind-builder against
# its OWN pod. The MVP instead points at the mind-codespaces bridge's CSS
# (:3011) so the WebID the builder signs in as matches the `owner` the
# bridge's `requireOwner` check expects — see AGENTS.md.
#
# Ports use the 307x decade to coexist with sibling prototypes:
#   - mind-market-v0       300x
#   - codespaces           301x
#   - mind-os-v0           302x
#   - chat                 303x
#   - mind-codespaces-ide  304x
#   - mind-social-network  305x
#   - drive                306x
#   - builder              307x  ← this stack (3070 app + 3071 CSS)

services:
  css:
    image: solidproject/community-server:latest
    container_name: mind-builder-css
    ports:
      - "3071:3071"
    volumes:
      - css-data:/data
      - ./infra/css/seed.json:/seed.json:ro
    command:
      - --port=3071
      - --baseUrl=http://localhost:3071/
      - --rootFilePath=/data
      - --seedConfig=/seed.json
      - --loggingLevel=warn
    restart: unless-stopped

volumes:
  css-data:
